<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="50%" style="stop-color:#E8D48B"/>
      <stop offset="100%" style="stop-color:#C9A84C"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative border -->
  <rect x="30" y="30" width="1140" height="570" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.3" rx="4"/>
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="url(#gold)" stroke-width="0.5" opacity="0.15" rx="2"/>

  <!-- Corner ornaments -->
  <line x1="30" y1="80" x2="80" y2="30" stroke="url(#gold)" stroke-width="0.5" opacity="0.4"/>
  <line x1="1120" y1="30" x2="1170" y2="80" stroke="url(#gold)" stroke-width="0.5" opacity="0.4"/>
  <line x1="30" y1="550" x2="80" y2="600" stroke="url(#gold)" stroke-width="0.5" opacity="0.4"/>
  <line x1="1120" y1="600" x2="1170" y2="550" stroke="url(#gold)" stroke-width="0.5" opacity="0.4"/>

  <!-- Harbor atmosphere dots -->
  <circle cx="200" cy="150" r="1" fill="#C9A84C" opacity="0.2"/>
  <circle cx="350" cy="200" r="1.5" fill="#C9A84C" opacity="0.15"/>
  <circle cx="900" cy="180" r="1" fill="#C9A84C" opacity="0.2"/>
  <circle cx="1050" cy="250" r="1.5" fill="#C9A84C" opacity="0.1"/>
  <circle cx="150" cy="400" r="1" fill="#C9A84C" opacity="0.15"/>
  <circle cx="1000" cy="450" r="1.5" fill="#C9A84C" opacity="0.2"/>

  <!-- Title: GRAYMAR -->
  <text x="600" y="240" text-anchor="middle" font-family="Georgia, 'Noto Serif KR', serif" font-size="72" font-weight="700" fill="url(#gold)" letter-spacing="12">GRAYMAR</text>

  <!-- Divider line -->
  <line x1="400" y1="270" x2="800" y2="270" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>
  <circle cx="600" cy="270" r="3" fill="#C9A84C" opacity="0.6"/>

  <!-- Korean subtitle -->
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Serif KR', Georgia, serif" font-size="32" fill="#E8D48B" opacity="0.9" letter-spacing="6">정치 음모 RPG</text>

  <!-- Description -->
  <text x="600" y="400" text-anchor="middle" font-family="'Noto Sans KR', sans-serif" font-size="18" fill="#8a8a9a" letter-spacing="1">왕국의 항만 도시에서 펼쳐지는 권력 투쟁</text>

  <!-- Tagline -->
  <text x="600" y="440" text-anchor="middle" font-family="'Noto Sans KR', sans-serif" font-size="16" fill="#6a6a7a" letter-spacing="1">AI가 만들어내는 살아있는 세계</text>

  <!-- Bottom badge -->
  <rect x="490" y="510" width="220" height="36" rx="18" fill="none" stroke="#C9A84C" stroke-width="0.8" opacity="0.4"/>
  <text x="600" y="534" text-anchor="middle" font-family="'IBM Plex Sans KR', sans-serif" font-size="13" fill="#C9A84C" opacity="0.7" letter-spacing="3">LLM TEXT RPG</text>
</svg>
